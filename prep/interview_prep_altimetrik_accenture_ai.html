const state = { altimetrik: { activeCat: 'All', revealed: new Set() }, accenture: { activeCat: 'All', revealed: new Set() } };

function getCats(tab) {
  const cats = ['All', ...new Set(data[tab].map(q => q.cat))];
  return cats;
}

function renderCats(tab) {
  const el = document.getElementById(tab === 'altimetrik' ? 'alt-cats' : 'acc-cats');
  const cats = getCats(tab);
  el.innerHTML = cats.map(c => `<button class="cat-pill ${state[tab].activeCat === c ? 'active' : ''}" onclick="filterCat('${tab}','${c}')">${c}</button>`).join('');
}

function filterCat(tab, cat) {
  state[tab].activeCat = cat;
  renderCats(tab);
  renderQuestions(tab);
}

function renderQuestions(tab) {
  const prefix = tab === 'altimetrik' ? 'alt' : 'acc';
  const filtered = data[tab].filter(q => state[tab].activeCat === 'All' || q.cat === state[tab].activeCat);
  const el = document.getElementById(prefix + '-qlist');
  if (filtered.length === 0) { el.innerHTML = '<div class="empty-state">No questions in this category</div>'; return; }
  el.innerHTML = filtered.map((q, i) => {
    const id = tab + '-' + data[tab].indexOf(q);
    const isRevealed = state[tab].revealed.has(id);
    return `<div class="q-card ${isRevealed ? 'revealed' : ''}" id="card-${id}" onclick="toggleAnswer('${id}','${tab}')">
      <div class="q-header">
        <span class="q-badge ${q.badge}">${q.cat}</span>
        <span class="q-text">${q.q}</span>
        <span class="q-toggle">${isRevealed ? '▲' : '▼'}</span>
      </div>
      <div class="q-answer ${isRevealed ? 'show' : ''}">${q.a}</div>
    </div>`;
  }).join('');
  updateStats(tab);
}

function toggleAnswer(id, tab) {
  const card = document.getElementById('card-' + id);
  const ans = card.querySelector('.q-answer');
  const toggle = card.querySelector('.q-toggle');
  if (ans.classList.contains('show')) {
    ans.classList.remove('show');
    toggle.textContent = '▼';
    card.classList.remove('revealed');
    state[tab].revealed.delete(id);
  } else {
    ans.classList.add('show');
    toggle.textContent = '▲';
    card.classList.add('revealed');
    state[tab].revealed.add(id);
  }
  updateStats(tab);
}

function revealAll(tab) {
  const prefix = tab === 'altimetrik' ? 'alt' : 'acc';
  const filtered = data[tab].filter(q => state[tab].activeCat === 'All' || q.cat === state[tab].activeCat);
  filtered.forEach(q => {
    const id = tab + '-' + data[tab].indexOf(q);
    state[tab].revealed.add(id);
  });
  renderQuestions(tab);
}

function updateStats(tab) {
  const prefix = tab === 'altimetrik' ? 'alt' : 'acc';
  const total = data[tab].length;
  const revealed = state[tab].revealed.size;
  document.getElementById(prefix + '-total').textContent = total;
  document.getElementById(prefix + '-revealed').textContent = revealed;
  document.getElementById(prefix + '-remain').textContent = total - revealed;
  document.getElementById(prefix + '-progress').style.width = Math.round((revealed / total) * 100) + '%';
}

function switchTab(tab) {
  document.getElementById('tab-altimetrik').style.display = tab === 'altimetrik' ? '' : 'none';
  document.getElementById('tab-accenture').style.display = tab === 'accenture' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'altimetrik') || (i === 1 && tab === 'accenture'));
  });
}

renderCats('altimetrik');
renderCats('accenture');
renderQuestions('altimetrik');
renderQuestions('accenture');
updateStats('altimetrik');
updateStats('accenture');
</script>
